# =============================================================================
# Base Image Promotion (Post-Merge)
# =============================================================================
# Trigger:  Push to main when docker/base/** changed
# Purpose:  Build permanent base images for use by other branches
# Images:   demo-base-dev:latest + demo-base-prod:$BASE_PROD_TAG (immutable)
# =============================================================================

name: Trunk Pipeline
run-name: "Trunk: ${{ github.sha }}"

on:
  push:
    branches: [main]
    paths:
      - 'docker/base/**'
      - '.dockerignore'

permissions:
  contents: read
  packages: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Parse BASE_PROD_TAG
        id: version
        run: |
          VERSION=$(grep -oP 'ARG BASE_PROD_TAG=\K.*' docker/app/Dockerfile)
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Base prod version: ${VERSION}"

      # Build and push demo-base-dev:latest
      # This is what other branches use as their default CI base
      - name: Build and push demo-base-dev:latest
        uses: docker/build-push-action@v7
        with:
          context: docker/base
          target: dev
          push: true
          tags: ghcr.io/${{ github.repository }}/demo-base-dev:latest
          cache-from: type=gha,scope=base-dev
          cache-to: type=gha,mode=max,scope=base-dev

      # Build and push demo-base-prod:X.Y.Z (immutable version tag)
      # This is what other branches' QA pipelines use
      - name: Build and push demo-base-prod:${{ steps.version.outputs.tag }}
        uses: docker/build-push-action@v7
        with:
          context: docker/base
          target: prod
          push: true
          tags: ghcr.io/${{ github.repository }}/demo-base-prod:${{ steps.version.outputs.tag }}
          cache-from: type=gha,scope=base-prod
          cache-to: type=gha,mode=max,scope=base-prod

      - name: Summary
        run: |
          echo "## Base Image Promotion" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Trigger** | merge to \`main\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Images pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | Tag | Mutable? |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-----|----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`demo-base-dev\` | \`latest\` | Yes (overwrites) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`demo-base-prod\` | \`${{ steps.version.outputs.tag }}\` | No (immutable) |" >> "$GITHUB_STEP_SUMMARY"
