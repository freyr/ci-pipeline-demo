name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      base-changed: ${{ steps.filter.outputs.base }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            base:
              - 'docker/base/**'

  build-base:
    needs: detect-changes
    if: needs.detect-changes.outputs.base-changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute image tag
        id: tag
        run: echo "tag=dev-$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev base image
        uses: docker/build-push-action@v6
        with:
          context: docker/base
          target: dev
          push: true
          tags: ghcr.io/${{ github.repository }}/demo-base-dev:${{ steps.tag.outputs.tag }}

  quality:
    needs: [detect-changes, build-base]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/demo-base-dev:${{ needs.build-base.outputs.image-tag || 'latest' }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: PHP-CS-Fixer (dry-run)
        run: composer cs-check

      - name: PHPStan
        run: composer phpstan

      - name: Deptrac
        run: composer deptrac

  test:
    needs: [detect-changes, build-base]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/demo-base-dev:${{ needs.build-base.outputs.image-tag || 'latest' }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: PHPUnit
        run: composer test

  build-app:
    needs: [detect-changes, build-base, quality, test]
    if: >-
      always() && !failure() && !cancelled()
      && contains(github.event.pull_request.labels.*.name, 'build-app')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Compute branch slug
        id: slug
        run: |
          REF="${{ github.head_ref || github.ref_name }}"
          SLUG=$(echo "$REF" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: app/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/demo-app:${{ steps.slug.outputs.slug }}
          build-args: |
            BASE_IMAGE=ghcr.io/${{ github.repository }}/demo-base-prod:latest
            APP_VERSION=${{ steps.slug.outputs.slug }}
          cache-from: type=gha,scope=app-pr
          cache-to: type=gha,mode=max,scope=app-pr
