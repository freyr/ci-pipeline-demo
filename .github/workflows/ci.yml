name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      base-changed: ${{ steps.filter.outputs.base }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            base:
              - 'docker/base/**'

  build-base:
    needs: detect-changes
    if: needs.detect-changes.outputs.base-changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "tag=dev-$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev base image
        uses: docker/build-push-action@v6
        with:
          context: docker/base
          target: dev
          push: true
          tags: ghcr.io/${{ github.repository }}/demo-base-dev:${{ steps.tag.outputs.tag }}

  quality:
    needs: [detect-changes, build-base]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/demo-base-dev:${{ needs.build-base.outputs.image-tag || 'latest' }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: PHP-CS-Fixer (dry-run)
        run: composer cs-check

      - name: PHPStan
        run: composer phpstan

      - name: Deptrac
        run: composer deptrac

  test:
    needs: [detect-changes, build-base]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/demo-base-dev:${{ needs.build-base.outputs.image-tag || 'latest' }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: PHPUnit
        run: composer test
