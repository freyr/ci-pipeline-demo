# =============================================================================
# Release Pipeline
# =============================================================================
# Trigger:  workflow_dispatch — select the tag in "Use workflow from" dropdown
# Flow:     Developer creates + pushes a git tag, then runs this workflow on it
# Purpose:  Build production app image, push to GHCR, publish GitHub release
# Images:   demo-base-prod:$BASE_PROD_TAG (if missing) + demo-app-prod:$tag + :latest
# =============================================================================

name: Build Release
run-name: "Release ${{ github.ref_name }}"

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # 1. Validate this is running on a tag
  # ---------------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Verify ref is a tag
        run: |
          if [[ "${{ github.ref }}" != refs/tags/* ]]; then
            echo "::error::This workflow must be run on a tag. Select a tag in the 'Use workflow from' dropdown."
            exit 1
          fi
          echo "Releasing tag: ${{ github.ref_name }}"

  # ---------------------------------------------------------------------------
  # 2. Build production app image
  # ---------------------------------------------------------------------------
  build:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      base-version: ${{ steps.base.outputs.version }}
      base-existed: ${{ steps.base-check.outputs.exists }}
    steps:
      - uses: actions/checkout@v6

      - name: Parse BASE_PROD_TAG
        id: base
        run: |
          VERSION=$(grep -oP 'ARG BASE_PROD_TAG=\K.*' docker/app/Dockerfile)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Base prod version: ${VERSION}"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      # Safety net: build base prod if it doesn't exist (normally built by promote-base)
      - name: Check if base prod image exists
        id: base-check
        run: |
          if docker manifest inspect ghcr.io/${{ github.repository }}/demo-base-prod:${{ steps.base.outputs.version }} > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Base image demo-base-prod:${{ steps.base.outputs.version }} found in registry"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Base image not found — building as safety net"
          fi

      - name: Build base prod image (safety net)
        if: steps.base-check.outputs.exists == 'false'
        uses: docker/build-push-action@v7
        with:
          context: docker/base
          target: prod
          push: true
          tags: ghcr.io/${{ github.repository }}/demo-base-prod:${{ steps.base.outputs.version }}

      # Build production app image with version + latest tags
      - name: Build and push demo-app-prod
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/app/Dockerfile
          target: prod
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/demo-app-prod:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/demo-app-prod:latest
          build-args: |
            BASE_PROD_IMAGE=ghcr.io/${{ github.repository }}/demo-base-prod
            BASE_PROD_TAG=${{ steps.base.outputs.version }}
            APP_VERSION=${{ github.ref_name }}
          cache-from: type=gha,scope=app-release
          cache-to: type=gha,mode=max,scope=app-release

  # ---------------------------------------------------------------------------
  # 3. Create GitHub release with auto-generated notes
  # ---------------------------------------------------------------------------
  release-notes:
    needs: [validate, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --generate-notes

  # ---------------------------------------------------------------------------
  # 4. Release Summary
  # ---------------------------------------------------------------------------
  release-summary:
    name: Release Summary
    if: always()
    needs: [validate, build, release-notes]
    runs-on: ubuntu-latest
    steps:
      - name: Pipeline overview
        run: |
          echo "## Release: \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Tag** | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Base version** | \`${{ needs.build.outputs.base-version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # --- Images ---
          echo "### Images" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | Tags | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|------|--------|" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ needs.build.outputs.base-existed }}" == "true" ]; then
            echo "| \`demo-base-prod\` | \`${{ needs.build.outputs.base-version }}\` (reused) | ⏭️ already in registry |" >> "$GITHUB_STEP_SUMMARY"
          else
            BUILD_STATUS="${{ needs.build.result }}"
            if [ "$BUILD_STATUS" == "success" ]; then ICON="✅"; else ICON="❌"; fi
            echo "| \`demo-base-prod\` | \`${{ needs.build.outputs.base-version }}\` (safety net) | ${ICON} built |" >> "$GITHUB_STEP_SUMMARY"
          fi

          BUILD_STATUS="${{ needs.build.result }}"
          if [ "$BUILD_STATUS" == "success" ]; then ICON="✅"; else ICON="❌"; fi
          echo "| \`demo-app-prod\` | \`${{ github.ref_name }}\`, \`latest\` | ${ICON} ${BUILD_STATUS} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # --- Release ---
          NOTES_STATUS="${{ needs.release-notes.result }}"
          if [ "$NOTES_STATUS" == "success" ]; then ICON="✅"; else ICON="❌"; fi
          echo "### GitHub Release: ${ICON} ${NOTES_STATUS}" >> "$GITHUB_STEP_SUMMARY"
          if [ "$NOTES_STATUS" == "success" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "[${{ github.ref_name }}](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }})" >> "$GITHUB_STEP_SUMMARY"
          fi
