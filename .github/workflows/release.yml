# =============================================================================
# Release Pipeline
# =============================================================================
# Trigger:  workflow_dispatch — select the tag in "Use workflow from" dropdown
# Flow:     Developer creates + pushes a git tag, then runs this workflow on it
# Purpose:  Build production app image, push to GHCR, publish GitHub release
# Images:   demo-base-prod:$BASE_PROD_TAG (if missing) + demo-app-prod:$tag + :latest
# =============================================================================

name: Release
run-name: "Release ${{ github.ref_name }}"

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # 1. Validate this is running on a tag
  # ---------------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Verify ref is a tag
        run: |
          if [[ "${{ github.ref }}" != refs/tags/* ]]; then
            echo "::error::This workflow must be run on a tag. Select a tag in the 'Use workflow from' dropdown."
            exit 1
          fi
          echo "Releasing tag: ${{ github.ref_name }}"

  # ---------------------------------------------------------------------------
  # 2. Build production app image
  # ---------------------------------------------------------------------------
  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Parse BASE_PROD_TAG
        id: base
        run: |
          VERSION=$(grep -oP 'ARG BASE_PROD_TAG=\K.*' docker/app/Dockerfile)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Base prod version: ${VERSION}"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      # Safety net: build base prod if it doesn't exist (normally built by promote-base)
      - name: Check if base prod image exists
        id: base-check
        run: |
          if docker manifest inspect ghcr.io/${{ github.repository }}/demo-base-prod:${{ steps.base.outputs.version }} > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Base image demo-base-prod:${{ steps.base.outputs.version }} found in registry"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Base image not found — building as safety net"
          fi

      - name: Build base prod image (safety net)
        if: steps.base-check.outputs.exists == 'false'
        uses: docker/build-push-action@v7
        with:
          context: docker/base
          target: prod
          push: true
          tags: ghcr.io/${{ github.repository }}/demo-base-prod:${{ steps.base.outputs.version }}

      # Build production app image with version + latest tags
      - name: Build and push demo-app-prod
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/app/Dockerfile
          target: prod
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/demo-app-prod:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/demo-app-prod:latest
          build-args: |
            BASE_PROD_IMAGE=ghcr.io/${{ github.repository }}/demo-base-prod
            BASE_PROD_TAG=${{ steps.base.outputs.version }}
            APP_VERSION=${{ github.ref_name }}
          cache-from: type=gha,scope=app-release
          cache-to: type=gha,mode=max,scope=app-release

      - name: Summary
        run: |
          echo "### Production image" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | Tags | Base version |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|------|-------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`demo-app-prod\` | \`${{ github.ref_name }}\`, \`latest\` | \`${{ steps.base.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # 3. Create GitHub release with auto-generated notes
  # ---------------------------------------------------------------------------
  release-notes:
    needs: [validate, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --generate-notes

      - name: Summary
        run: |
          echo "### Release published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[${{ github.ref_name }}](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }})" >> "$GITHUB_STEP_SUMMARY"
