name: Deploy
run-name: "Deploy ${{ inputs.tag }}"

on:
  workflow_call:
    inputs:
      tag:
        type: string
        required: true
  workflow_dispatch:
    inputs:
      tag:
        description: 'CalVer tag to build and release'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build-base-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push prod base image
        uses: docker/build-push-action@v7
        with:
          context: docker/base
          target: prod
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/demo-base-prod:${{ inputs.tag }}
            ghcr.io/${{ github.repository }}/demo-base-prod:latest
          cache-from: type=gha,scope=base-prod
          cache-to: type=gha,mode=max,scope=base-prod

      - name: Build and push dev base image
        uses: docker/build-push-action@v7
        with:
          context: docker/base
          target: dev
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/demo-base-dev:${{ inputs.tag }}
            ghcr.io/${{ github.repository }}/demo-base-dev:latest
          cache-from: type=gha,scope=base-dev
          cache-to: type=gha,mode=max,scope=base-dev

      - name: Summary
        run: |
          echo "### Base images pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | Tags |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`demo-base-prod\` | \`${{ inputs.tag }}\`, \`latest\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`demo-base-dev\` | \`${{ inputs.tag }}\`, \`latest\` |" >> "$GITHUB_STEP_SUMMARY"

  build-app-image:
    needs: build-base-images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push app image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/demo-app:${{ inputs.tag }}
            ghcr.io/${{ github.repository }}/demo-app:latest
          build-args: |
            BASE_IMAGE=ghcr.io/${{ github.repository }}/demo-base-prod:${{ inputs.tag }}
            APP_VERSION=${{ inputs.tag }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Summary
        run: |
          echo "### App image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | Tags | Base |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`demo-app\` | \`${{ inputs.tag }}\`, \`latest\` | \`demo-base-prod:${{ inputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"

  release-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ inputs.tag }}" --generate-notes

      - name: Summary
        run: |
          echo "### Release created" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**[${{ inputs.tag }}](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ inputs.tag }})**" >> "$GITHUB_STEP_SUMMARY"
