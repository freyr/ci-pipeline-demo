name: Deploy

on:
  workflow_call:
    inputs:
      tag:
        type: string
        required: true
  workflow_dispatch:
    inputs:
      tag:
        description: 'CalVer tag to build and release'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build-base-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push prod base image
        uses: docker/build-push-action@v6
        with:
          context: docker/base
          target: prod
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/demo-base-prod:${{ inputs.tag }}
            ghcr.io/${{ github.repository }}/demo-base-prod:latest
          cache-from: type=gha,scope=base-prod
          cache-to: type=gha,mode=max,scope=base-prod

      - name: Build and push dev base image
        uses: docker/build-push-action@v6
        with:
          context: docker/base
          target: dev
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/demo-base-dev:${{ inputs.tag }}
            ghcr.io/${{ github.repository }}/demo-base-dev:latest
          cache-from: type=gha,scope=base-dev
          cache-to: type=gha,mode=max,scope=base-dev

  build-app-image:
    needs: build-base-images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/demo-app:${{ inputs.tag }}
            ghcr.io/${{ github.repository }}/demo-app:latest
          build-args: |
            BASE_IMAGE=ghcr.io/${{ github.repository }}/demo-base-prod:${{ inputs.tag }}
            APP_VERSION=${{ inputs.tag }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

  release-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ inputs.tag }}" --generate-notes
